services:
  - type: web
    name: dnscheck
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dnscheck-db
          property: connectionString
      - key: POLL_INTERVAL_MS
        value: "60000"

databases:
  - name: dnscheck-db
    databaseName: dnscheck
    plan: starter
    ipAllowList: []
